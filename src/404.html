<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | Mohan Seetha</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        font-family: "Manrope", sans-serif;
        background: #fff;
        color: #31332c;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }

      .card {
        max-width: 34rem;
        text-align: center;
        border: 1px solid #ece8e2;
        border-radius: 0.9rem;
        padding: 2rem 1.5rem;
        box-shadow: 0 12px 30px rgba(49, 51, 44, 0.08);
      }

      .code {
        font-size: 0.75rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #6a5d4d;
        margin: 0;
      }

      h1 {
        font-family: "Fraunces", serif;
        font-size: clamp(2rem, 6vw, 3.2rem);
        margin: 0.5rem 0 0.7rem;
      }

      p {
        margin: 0;
        color: #5e6058;
      }

      a {
        display: inline-block;
        margin-top: 1.4rem;
        color: #31332c;
        text-decoration: none;
        font-weight: 600;
        border-bottom: 1px solid #31332c;
      }

      a:hover {
        color: #6a5d4d;
        border-bottom-color: #6a5d4d;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card" aria-labelledby="not-found-title">
        <p class="code">Error 404</p>
        <h1 id="not-found-title">Page Not Found</h1>
        <p>The page you requested does not exist or has been moved.</p>
        <a href="/">Return to Home</a>
      </section>
    </main>
  </body>
</html>
